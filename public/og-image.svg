<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#0d0d10"/>
      <stop offset="100%" stop-color="#1d1d22"/>
    </linearGradient>

    <linearGradient id="ring" x1="0" y1="0" x2="320" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#8eb8ff"/>
      <stop offset="50%" stop-color="#6aa8ff"/>
      <stop offset="100%" stop-color="#a25dd0"/>
    </linearGradient>
    <linearGradient id="half" x1="160" y1="0" x2="160" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#6aa8ff"/>
      <stop offset="100%" stop-color="#a25dd0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="#6aa8ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6aa8ff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="title" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#f3f3f5"/>
      <stop offset="100%" stop-color="#8eb8ff"/>
    </linearGradient>

    <linearGradient id="sliderTrack" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3a3f44"/>
      <stop offset="100%" stop-color="#3a3f44"/>
    </linearGradient>
    <linearGradient id="sliderFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#6aa8ff"/>
      <stop offset="100%" stop-color="#a25dd0"/>
    </linearGradient>

    <linearGradient id="cinematicBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#1f2540"/>
      <stop offset="35%" stop-color="#2b6dd0"/>
      <stop offset="65%" stop-color="#e3a14b"/>
      <stop offset="100%" stop-color="#5a3a1a"/>
    </linearGradient>
  </defs>

  <!-- Backdrop -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid texture -->
  <g opacity="0.05">
    <g stroke="#ffffff" stroke-width="1">
      <line x1="0" y1="105" x2="1200" y2="105"/>
      <line x1="0" y1="210" x2="1200" y2="210"/>
      <line x1="0" y1="315" x2="1200" y2="315"/>
      <line x1="0" y1="420" x2="1200" y2="420"/>
      <line x1="0" y1="525" x2="1200" y2="525"/>
      <line x1="150" y1="0" x2="150" y2="630"/>
      <line x1="300" y1="0" x2="300" y2="630"/>
      <line x1="450" y1="0" x2="450" y2="630"/>
      <line x1="600" y1="0" x2="600" y2="630"/>
      <line x1="750" y1="0" x2="750" y2="630"/>
      <line x1="900" y1="0" x2="900" y2="630"/>
      <line x1="1050" y1="0" x2="1050" y2="630"/>
    </g>
  </g>

  <!-- Logo / lens -->
  <g transform="translate(80, 155)">
    <circle cx="160" cy="160" r="170" fill="url(#glow)"/>
    <circle cx="160" cy="160" r="138" fill="none" stroke="url(#ring)" stroke-width="14" stroke-linecap="round"/>
    <path d="M160 22 A138 138 0 0 1 160 298 Z" fill="url(#half)" opacity="0.95"/>
    <circle cx="160" cy="160" r="36" fill="#0d0d10"/>
    <circle cx="160" cy="160" r="16" fill="#d6e6ff"/>
    <circle cx="148" cy="148" r="7" fill="#ffffff" opacity="0.85"/>
  </g>

  <!-- Wordmark + tagline -->
  <g transform="translate(460, 200)">
    <text x="0" y="0" font-size="120" font-weight="700" letter-spacing="-2" fill="url(#title)">imgstry</text>
    <text x="6" y="42" font-size="20" font-weight="700" letter-spacing="6" fill="#8b929a">DEVELOP STUDIO</text>

    <text x="0" y="120" font-size="34" font-weight="600" letter-spacing="-0.4" fill="#f3f3f5">Lightroom in the browser.</text>
    <text x="0" y="166" font-size="34" font-weight="600" letter-spacing="-0.4" fill="#6aa8ff">Free. Offline. No nag.</text>
  </g>

  <!-- Slider mockup row -->
  <g transform="translate(460, 430)" font-size="16" font-weight="600" fill="#9b9ba4" letter-spacing="2">
    <g transform="translate(0, 0)">
      <text x="0" y="0">EXPOSURE</text>
      <rect x="0" y="14" width="320" height="6" rx="3" fill="url(#sliderTrack)"/>
      <rect x="0" y="14" width="210" height="6" rx="3" fill="url(#sliderFill)"/>
      <circle cx="210" cy="17" r="9" fill="#f3f3f5" stroke="#131316" stroke-width="3"/>
    </g>
    <g transform="translate(360, 0)">
      <text x="0" y="0">CONTRAST</text>
      <rect x="0" y="14" width="320" height="6" rx="3" fill="url(#sliderTrack)"/>
      <rect x="160" y="14" width="100" height="6" rx="3" fill="url(#sliderFill)"/>
      <circle cx="260" cy="17" r="9" fill="#f3f3f5" stroke="#131316" stroke-width="3"/>
    </g>
  </g>
  <g transform="translate(460, 490)" font-size="16" font-weight="600" fill="#9b9ba4" letter-spacing="2">
    <g transform="translate(0, 0)">
      <text x="0" y="0">VIBRANCE</text>
      <rect x="0" y="14" width="320" height="6" rx="3" fill="url(#sliderTrack)"/>
      <rect x="160" y="14" width="60" height="6" rx="3" fill="url(#sliderFill)"/>
      <circle cx="220" cy="17" r="9" fill="#f3f3f5" stroke="#131316" stroke-width="3"/>
    </g>
    <g transform="translate(360, 0)">
      <text x="0" y="0">TEMPERATURE</text>
      <rect x="0" y="14" width="320" height="6" rx="3" fill="url(#sliderTrack)"/>
      <rect x="80" y="14" width="80" height="6" rx="3" fill="url(#sliderFill)"/>
      <circle cx="80" cy="17" r="9" fill="#f3f3f5" stroke="#131316" stroke-width="3"/>
    </g>
  </g>

  <!-- Preset palette chips -->
  <g transform="translate(80, 530)" font-size="14" font-weight="700" letter-spacing="2" fill="#9b9ba4">
    <text x="0" y="0">PRESETS</text>
    <g transform="translate(0, 14)">
      <rect x="0"   y="0" width="68" height="56" rx="10" fill="#232328" stroke="#3a3f44"/>
      <circle cx="14" cy="20" r="5" fill="#c98ee5"/>
      <text x="14" y="42" font-size="11" font-weight="600" fill="#f3f3f5" letter-spacing="0">Teal</text>

      <rect x="76"  y="0" width="68" height="56" rx="10" fill="#232328" stroke="#3a3f44"/>
      <circle cx="90" cy="20" r="5" fill="#e3a14b"/>
      <text x="90" y="42" font-size="11" font-weight="600" fill="#f3f3f5" letter-spacing="0">Kodak</text>

      <rect x="152" y="0" width="68" height="56" rx="10" fill="#232328" stroke="#3a3f44"/>
      <circle cx="166" cy="20" r="5" fill="#6aa8ff"/>
      <text x="166" y="42" font-size="11" font-weight="600" fill="#f3f3f5" letter-spacing="0">Vibrant</text>

      <rect x="228" y="0" width="68" height="56" rx="10" fill="#232328" stroke="#3a3f44"/>
      <circle cx="242" cy="20" r="5" fill="#a5a5a8"/>
      <text x="242" y="42" font-size="11" font-weight="600" fill="#f3f3f5" letter-spacing="0">B&amp;W</text>
    </g>
  </g>

  <!-- Cinematic bar at top -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#cinematicBar)"/>

  <!-- URL footer -->
  <text x="1120" y="600" font-size="18" font-weight="600" fill="#5f676e" text-anchor="end" letter-spacing="1">
    visual-cortex.github.io/imgstry-ui
  </text>
</svg>
