name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  verify:
    name: verify / node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24']
    steps:
      - name: Checkout imgstry-ui
        uses: actions/checkout@v6
        with:
          path: imgstry-ui

      - name: Checkout imgstry engine
        uses: actions/checkout@v6
        with:
          repository: visual-cortex/imgstry
          path: imgstry

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: imgstry-ui/package-lock.json

      - name: Install imgstry engine dependencies
        working-directory: imgstry
        run: npm ci

      - name: Restore dependencies
        working-directory: imgstry-ui
        run: npm ci

      - name: svelte-check
        working-directory: imgstry-ui
        run: npm run check

      - name: Build
        working-directory: imgstry-ui
        run: npm run build

      - name: Upload build artifacts
        if: matrix.node == '22'
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ github.sha }}
          path: imgstry-ui/dist
          retention-days: 7
